# Deploy ASP.NET Asset Manager to AWS ECS (Fargate).
# Prerequisites:
# 1) terraform apply in terraform/ecs-asset-manager
# 2) GitHub repository → Settings → Secrets and variables → Actions:
#    - AWS_ROLE_TO_ASSUME  = output github_actions_role_arn (after enable_github_oidc)
#    - ECR_REPOSITORY_URL = output ecr_repository_url (no :tag)
# 3) Repository → Settings → Variables:
#    - ECS_CLUSTER_NAME = output ecs_cluster_name
#    - ECS_SERVICE_NAME = output ecs_service_name
name: Deploy Asset Manager (ECS)

on:
  push:
    branches: [main]
    paths:
      - "AssetManager/**"
      - ".github/workflows/asset-manager-ecs.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REPOSITORY_URL: ${{ secrets.ECR_REPOSITORY_URL }}
          IMAGE_SHA: ${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.ECR_REPOSITORY_URL }}:latest
        run: |
          docker build -f AssetManager/Dockerfile -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "IMAGE_SHA=$IMAGE_SHA" >> "$GITHUB_ENV"

      - name: Register new task definition revision (immutable image)
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
          SERVICE: ${{ vars.ECS_SERVICE_NAME }}
          IMAGE_SHA: ${{ env.IMAGE_SHA }}
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query "services[0].taskDefinition" --output text)
          aws ecs describe-task-definition --task-definition "$TASK_DEF_ARN" --query "taskDefinition" > taskdef.json
          jq --arg IMAGE "$IMAGE_SHA" '
            .containerDefinitions[0].image = $IMAGE
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
          ' taskdef.json > taskdef.new.json
          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://taskdef.new.json --query "taskDefinition.taskDefinitionArn" --output text)
          echo "NEW_TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> "$GITHUB_ENV"

      - name: Deploy new task definition
        env:
          CLUSTER: ${{ vars.ECS_CLUSTER_NAME }}
          SERVICE: ${{ vars.ECS_SERVICE_NAME }}
          NEW_TASK_DEF_ARN: ${{ env.NEW_TASK_DEF_ARN }}
        run: |
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --task-definition "$NEW_TASK_DEF_ARN"
